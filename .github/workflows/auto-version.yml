name: Auto Version

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore(version):')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "No tags found, skipping"
            echo "bump=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" --no-merges)
          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LATEST_TAG"
            echo "bump=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP="none"
          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            if echo "$msg" | grep -qE '^[a-z]+(\(.+\))?!:' || echo "$msg" | grep -qi 'BREAKING CHANGE'; then
              BUMP="major"; break
            fi
            if echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
              [ "$BUMP" != "major" ] && BUMP="minor"
            fi
            if echo "$msg" | grep -qE '^(fix|perf)(\(.+\))?:'; then
              [ "$BUMP" = "none" ] && BUMP="patch"
            fi
          done <<< "$COMMITS"

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Determined bump: $BUMP"

      - name: Bump version
        if: steps.bump.outputs.bump != 'none'
        id: version
        env:
          BUMP: ${{ steps.bump.outputs.bump }}
        run: |
          CURRENT=$(cat VERSION)

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "$NEW_VERSION" > VERSION

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT → $NEW_VERSION ($BUMP)"

      - name: Commit and tag
        if: steps.bump.outputs.bump != 'none'
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add VERSION
          git commit -m "chore(version): bump to v${NEW_VERSION}"
          git tag -a "v${NEW_VERSION}" -m "v${NEW_VERSION}"
          git push origin main --follow-tags
